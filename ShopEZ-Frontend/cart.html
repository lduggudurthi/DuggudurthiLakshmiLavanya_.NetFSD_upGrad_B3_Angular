<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    .cart-img { width: 80px; height: 80px; object-fit: cover; }
    .quantity-btn { width: 30px; }
    .cart-total { font-size: 1.2rem; font-weight: bold; }
  </style>
</head>
<body class="p-4">

  <h2>My Cart 🛒</h2>
  <div id="cartContainer" class="mt-4"></div>

  <div class="mt-3 text-end">
    <span class="cart-total">Total: ₹<span id="cartTotal">0</span></span>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="product.js"></script> <!-- your existing JS -->
  <script>
    $(document).ready(function () {
      loadCart();
    });

    // ✅ Load cart items
    function loadCart() {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      if (cart.length === 0) {
        $("#cartContainer").html("<p>Your cart is empty 😔</p>");
        $("#cartTotal").text(0);
        return;
      }

      let output = `<table class="table table-bordered align-middle">
        <thead>
          <tr>
            <th>Product</th>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Subtotal</th>
            <th>Remove</th>
          </tr>
        </thead>
        <tbody>`;

      let total = 0;
      cart.forEach(item => {
        let subtotal = item.price * item.quantity;
        total += subtotal;

        output += `
          <tr>
            <td><img src="${item.image}" class="cart-img" alt="${item.name}"></td>
            <td>${item.name}</td>
            <td>₹${item.price}</td>
            <td>
              <div class="d-flex align-items-center">
                <button class="btn btn-sm btn-secondary quantity-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                <span class="mx-2">${item.quantity}</span>
                <button class="btn btn-sm btn-secondary quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
              </div>
            </td>
            <td>₹${subtotal}</td>
            <td><button class="btn btn-danger btn-sm" onclick="removeFromCart(${item.id})"><i class="bi bi-x-circle"></i></button></td>
          </tr>
        `;
      });

      output += `</tbody></table>`;
      $("#cartContainer").html(output);
      $("#cartTotal").text(total);
    }

    // ✅ Update quantity
    function updateQuantity(productId, change) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      let item = cart.find(i => i.id === productId);
      if (!item) return;

      item.quantity += change;
      if (item.quantity <= 0) {
        cart = cart.filter(i => i.id !== productId); // remove if zero
      }

      localStorage.setItem("cart", JSON.stringify(cart));
      loadCart();
      updateCartCount(); // update count in header if needed
    }

    // ✅ Remove item
    function removeFromCart(productId) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart = cart.filter(i => i.id !== productId);
      localStorage.setItem("cart", JSON.stringify(cart));
      loadCart();
      updateCartCount();
    }
  </script>
</body>
</html>
