<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>simple discount Calculator</title>
</head>
<body>
    <h2>Online Store Discount Calculator</h2>
    <script>
        let amount = 5200;
        let discount = 0;
        let fAmount = 0;
        if (amount >= 5000) {
            discount = amount * 0.20;
        }
        else if (amount >= 3000) {
            discount = amount * 0.10;
        }
        else {
            discount = 0;
        }
        fAmount = amount - discount;
        document.write("purchase Amount: " + amount + "<br>");
        document.write("discount Amount: " + discount + "<br>");
        document.write("final Payable Amount: " + fAmount);
        console.log("Amount: " + amount);
        console.log("Discount: " + discount);
        console.log("Final Amount: " + fAmount);
    </script>
</body>
</html>
