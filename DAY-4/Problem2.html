<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>grading system</title>
</head>
<body>
    <h2>Student Academic grade evaluation</h2>
        <script>
            let stumarks = 88;

        if (stumarks >= 75) {
            document.write("Grade A");
        } 
        else if (stumarks >= 60) {
            document.write("Grade B");
        } 
        else if (stumarks >= 40) {
            document.write("Grade C");
        } 
        else {
            document.write("Fail");
        }
            console.log("Student marks: "+stumarks)     
        </script>
</body>
</html>
