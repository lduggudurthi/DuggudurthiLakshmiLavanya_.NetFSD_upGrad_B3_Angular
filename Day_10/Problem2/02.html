<!DOCTYPE html>
<html>
<head>
  <title>E-Commerce</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .hero {
      background: #0d6efd;
      color: white;
      padding: 60px 0;
      text-align: center;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Shop</a>
    <button class="navbar-toggler" data-bs-toggle="offcanvas" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="offcanvas offcanvas-end" id="menu">
      <div class="offcanvas-header">
        <h5>Menu</h5>
        <button class="btn-close" data-bs-dismiss="offcanvas"></button>
      </div>
      <div class="offcanvas-body">
        <a href="#" class="d-block mb-2">Home</a>
        <a href="#" class="d-block mb-2">Products</a>
        <a href="#" class="d-block">Contact</a>
      </div>
    </div>
  </div>
</nav>

<section class="hero">
  <h1>Welcome to Max Store</h1>
  <p>Best Products at Best Prices</p>
  <button class="btn btn-light">Shop Now</button>
</section>

<div id="carouselExample" class="carousel slide container my-4" data-bs-ride="carousel">
  <div class="carousel-inner text-center p-5 bg-light">

    <div class="carousel-item active">
      <h3>Big Sale - 50% Off</h3>
    </div>

    <div class="carousel-item">
      <h3>New Arrivals Available</h3>
    </div>

    <div class="carousel-item">
      <h3>Free Shipping on Orders Above $100</h3>
    </div>

  </div>
</div>

<div class="container my-4">
  <div class="row g-3">
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card p-3 text-center">Product 1</div>
    </div>
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card p-3 text-center">Product 2</div>
    </div>
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card p-3 text-center">Product 3</div>
    </div>
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card p-3 text-center">Product 4</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
