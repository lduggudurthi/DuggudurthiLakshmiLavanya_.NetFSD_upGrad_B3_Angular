<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>E-Commerce Landing</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar with Offcanvas -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <button class="btn btn-outline-light" data-bs-toggle="offcanvas" data-bs-target="#menu">
      ☰ Menu
    </button>
    <a class="navbar-brand fw-bold">ShopZone</a>
  </div>
</nav>

<!-- Offcanvas -->
<div class="offcanvas offcanvas-start" id="menu">
  <div class="offcanvas-header">
    <h5>Menu</h5>
    <button class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <a href="#" class="d-block mb-2">Home</a>
    <a href="#" class="d-block mb-2">Products</a>
    <a href="#" class="d-block mb-2">Offers</a>
    <a href="#" class="d-block">Contact</a>
  </div>
</div>

<!-- Hero Section -->
<div class="container-fluid bg-primary text-white text-center py-5">
  <h1 class="fw-bold">Big Sale is Live!</h1>
  <p>Up to 50% off on electronics</p>
  <button class="btn btn-light">Shop Now</button>
</div>

<!-- Carousel -->
<div id="carouselExample" class="carousel slide mt-4" data-bs-ride="carousel">
  <div class="carousel-inner">

    <div class="carousel-item active">
      <img src="https://via.placeholder.com/1200x400" class="d-block w-100">
    </div>

    <div class="carousel-item">
      <img src="https://via.placeholder.com/1200x400" class="d-block w-100">
    </div>

  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>

<!-- Product Section -->
<div class="container my-5">
  <div class="row g-4">

    <div class="col-12 col-md-6 col-lg-3">
      <div class="card h-100 shadow-sm">
        <img src="https://via.placeholder.com/200" class="card-img-top">
        <div class="card-body text-center">
          <h5>Laptop</h5>
          <button class="btn btn-primary btn-sm">Buy Now</button>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-3">
      <div class="card h-100 shadow-sm">
        <img src="https://via.placeholder.com/200" class="card-img-top">
        <div class="card-body text-center">
          <h5>Smartphone</h5>
          <button class="btn btn-primary btn-sm">Buy Now</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Newsletter -->
<div class="container text-center my-5">
  <h4>Subscribe to our Newsletter</h4>
  <input type="email" class="form-control w-50 mx-auto mb-3" placeholder="Enter Email">
  <button class="btn btn-dark">Subscribe</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
