<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>College Event Dashboard</title>

<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">College Events</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link">Events</a></li>
        <li class="nav-item"><a class="nav-link">Students</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Dashboard Content -->
<div class="container my-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">Upcoming Events</h3>
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#eventModal">
      + Add Event
    </button>
  </div>

  <!-- Responsive Grid -->
  <div class="row g-4">

    <div class="col-12 col-md-6 col-lg-4 col-xl-3">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title">Tech Fest</h5>
          <p class="card-text">Date: 20 Feb</p>
          <p class="card-text">Venue: Auditorium</p>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-4 col-xl-3">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title">Cultural Night</h5>
          <p class="card-text">Date: 10 March</p>
          <p class="card-text">Venue: Open Ground</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="eventModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Add New Event</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form class="needs-validation" novalidate>
          
          <div class="mb-3">
            <label class="form-label">Event Name</label>
            <input type="text" class="form-control" required>
            <div class="invalid-feedback">Please enter event name.</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" class="form-control" required>
            <div class="invalid-feedback">Please select date.</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Venue</label>
            <input type="text" class="form-control" required>
            <div class="invalid-feedback">Please enter venue.</div>
          </div>

          <button class="btn btn-primary w-100">Save Event</button>

        </form>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Validation Script -->
<script>
(() => {
  'use strict'
  const forms = document.querySelectorAll('.needs-validation')
  Array.from(forms).forEach(form => {
    form.addEventListener('submit', event => {
      if (!form.checkValidity()) {
        event.preventDefault()
        event.stopPropagation()
      }
      form.classList.add('was-validated')
    }, false)
  })
})();
</script>

</body>
</html>
