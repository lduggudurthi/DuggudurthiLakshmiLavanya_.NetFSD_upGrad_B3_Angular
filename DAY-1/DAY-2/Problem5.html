<!DOCTYPE html>
<html>
<head>
    <title>Course Enrollment Form</title>
</head>
<body>

<header>
    <h1>Course Enrollment</h1>
</header>

<main>
    <form>

        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" required>
        <br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required>
        <br><br>

        <label for="course">Select Course:</label><br>
        <input list="courseList" id="course" name="course" required>
        <datalist id="courseList">
            <option value="HTML">
            <option value="CSS">
            <option value="JavaScript">
            <option value="Python">
            <option value="Java">
        </datalist>
        <br><br>

        <label for="age">Age:</label><br>
        <input type="number" id="age" name="age" min="18" max="60" required>
        <br><br>

        <label for="skill">Skill Level (Beginner–Advanced):</label><br>
        <input type="range" id="skill" name="skill" min="1" max="10" required>
        <br><br>

        <label for="skillMeter">Skill Level Indicator:</label><br>
        <meter id="skillMeter" min="1" max="10" value="5">5</meter>
        <br><br>

        <label for="progress">Enrollment Completion:</label><br>
        <progress id="progress" value="60" max="100">60%</progress>
        <br><br>

        <input type="submit" value="Enroll">

    </form>
</main>

</body>
</html>
