<!DOCTYPE html>
<html>
<head>
  <title>E-Commerce</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar with Offcanvas -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <button class="btn btn-outline-light" data-bs-toggle="offcanvas" data-bs-target="#menu">Menu</button>
    <a class="navbar-brand">Shop</a>
  </div>
</nav>

<div class="offcanvas offcanvas-start" id="menu">
  <div class="offcanvas-body">
    <a href="#" class="d-block mb-2">Home</a>
    <a href="#" class="d-block mb-2">Products</a>
    <a href="#" class="d-block">Contact</a>
  </div>
</div>

<!-- Carousel -->
<div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="https://via.placeholder.com/1200x400" class="d-block w-100">
    </div>
    <div class="carousel-item">
      <img src="https://via.placeholder.com/1200x400" class="d-block w-100">
    </div>
  </div>
</div>

<!-- Newsletter -->
<div class="container text-center my-5">
  <h3>Subscribe</h3>
  <input type="email" class="form-control w-50 mx-auto mb-3" placeholder="Enter Email">
  <button class="btn btn-primary">Subscribe</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
