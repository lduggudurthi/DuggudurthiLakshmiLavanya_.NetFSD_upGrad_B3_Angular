<!DOCTYPE html>
<html>
<head>
    <title>Product Cart</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        .product { 
            border:1px solid #ccc; padding:10px; margin:10px 0; 
        }
        .message { 
            color:green; margin-left:10px;
         }
    </style>
</head>
<body>

<h2>Cart Items: <span id="cartCount" style="color: red;">0</span></h2>

<div class="product">
    <p>Laptop</p>
    <button class="addButton">Add to Cart</button>
    <span class="message"></span>
</div>

<div class="product">
    <p>Mobile</p>
    <button class="addButton">Add to Cart</button>
    <span class="message"></span>
</div>

<div class="product">
    <p>Headphones</p>
    <button class="addButton">Add to Cart</button>
    <span class="message"></span>
</div>

<div class="product">
    <p>Smart Watch</p>
    <button class="addButton">Add to Cart</button>
    <span class="message"></span>
</div>

<script>

$(document).ready(function(){

    let count = 0;

    $(document).on("click", ".addButton", function(){

        if($(this).text() === "Add to Cart")
        {
            count++;
            $("#cartCount").text(count);

            $(this).text("Remove");
            $(this).next(".message").text("Item added");
        }
        else
        {
            count--;
            $("#cartCount").text(count);

            $(this).text("Add to Cart");
            $(this).next(".message").text("");
        }

    });

});

</script>

</body>
</html>
